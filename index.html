  "Twitter/X":"M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.73-8.835L1.254 2.25H8.08l4.26 5.632L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z",

};
const STATUSES  = ["Prospectando","Contato enviado","Follow-up","Cliente","Recusou","Sem resposta"];
const STAT = {
  Prospectando:     ["#6B6B90","rgba(107,107,144,0.12)"],
  "Contato enviado":["#9B8BFF","rgba(155,139,255,0.12)"],
  "Follow-up":      ["#E0A020","rgba(224,160,32,0.12)"],
  Cliente:          ["#5DB87A","rgba(93,184,122,0.12)"],
  Recusou:          ["#FF5555","rgba(255,85,85,0.12)"],
  "Sem resposta":   ["#444","rgba(68,68,68,0.12)"],
};
const PRIORITY = { Alta:["🟢","#5DB87A"], Média:["🟡","#E0A020"], Baixa:["🔴","#FF5555"] };
const PRIORITY_KEYS = ["Alta","Média","Baixa"];
const NICHES = ["Gaming","Lifestyle","Tech","Educação","Entretenimento","Fitness","Culinária","Finanças","Moda","Negócios","Música","Outro"];
const EMPTY_C = { nome:"", plataforma:"YouTube", nicho:"", seguidores:"", contato:"", link:"", status:"Prospectando", prioridade:"Média", dataContato:"", orcamento:"", observacoes:"" };
const EMPTY_F = { cliente:"", valor:"", data: new Date().toISOString().split("T")[0], descricao:"", status:"Pago" };

const C = { bg:"#080808", surface:"#101010", card:"#131313", hover:"#1A1A1A", border:"#222", border2:"#2A2A2A", accent:"#FFF", text:"#F0F0F0", sub:"#AAAAAA", muted:"#555", red:"#FF4444", green:"#5DB87A", yellow:"#E0A020" };
const FF = "'Space Grotesk', system-ui, sans-serif";
const sf = { fontFamily: FF };
const iSt = { display:"block", width:"100%", boxSizing:"border-box", background:"#0A0A0A", border:"1px solid #222", borderRadius:8, padding:"9px 12px", color:C.text, fontSize:14, marginTop:5, fontFamily:FF, outline:"none" };
const lSt = { fontSize:10, fontWeight:600, color:C.muted, textTransform:"uppercase", letterSpacing:"0.8px" };

// ── HELPERS ────────────────────────────────────────────────
const today    = () => new Date().toISOString().split("T")[0];
const nowYM    = () => today().substring(0,7);
const fmtBRL   = v => (parseFloat(v)||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const fmtMonth = ym => { const [y,m]=ym.split("-"); return ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"][+m-1]+" "+y; };
const groupByMonth = entries => {
  const g = {};
  entries.forEach(e => { const k=e.data.substring(0,7); if(!g[k])g[k]=[]; g[k].push(e); });
  return Object.entries(g).sort((a,b)=>b[0].localeCompare(a[0]));
};

// ── APP ────────────────────────────────────────────────────
function App() {
  const [section,    setSection]    = useState("prospeccao");

  // prospecção state
  const [creators,   setCreators]   = useState([]);
  const [cModal,     setCModal]     = useState(false);
  const [cEditId,    setCEditId]    = useState(null);
  const [cForm,      setCForm]      = useState(EMPTY_C);
  const [cSearch,    setCSearch]    = useState("");
  const [cFSt,       setCFSt]       = useState("");
  const [cFPl,       setCFPl]       = useState("");
  const [cFNicho,    setCFNicho]    = useState("");
  const [cHovered,   setCHovered]   = useState(null);
  const [cDelConf,      setCDelConf]      = useState(null);
  const [prospectarModal,setProspectarModal] = useState(false);
  const [prospectarLote, setProspectarLote]  = useState([]);

  // financeiro state
  const [entries,    setEntries]    = useState([]);
  const [fModal,     setFModal]     = useState(false);
  const [fEditId,    setFEditId]    = useState(null);
  const [fForm,      setFForm]      = useState(EMPTY_F);
  const [fHovered,   setFHovered]   = useState(null);
  const [fDelConf,   setFDelConf]   = useState(null);
  const [meta,       setMeta]       = useState(0);
  const [editingMeta,setEditingMeta]= useState(false);
  const [metaInput,  setMetaInput]  = useState("");
  const [links,      setLinks]      = useState([]);
  const [linkInput,  setLinkInput]  = useState({label:"",url:""});

  const [loading, setLoading] = useState(true);

  useEffect(() => {
    try { const s=localStorage.getItem("prospeccao_v1"); if(s) setCreators(JSON.parse(s)); } catch {}
    try { const s=localStorage.getItem("financeiro_v1");  if(s) setEntries(JSON.parse(s));  } catch {}
    try { const s=localStorage.getItem("meta_mensal");    if(s) setMeta(parseFloat(s)||0);  } catch {}
    try { const s=localStorage.getItem("links_uteis");    if(s) setLinks(JSON.parse(s));     } catch {}
    setLoading(false);
  }, []);

  const saveC = l => { try { localStorage.setItem("prospeccao_v1", JSON.stringify(l)); } catch {} };
  const saveF = l => { try { localStorage.setItem("financeiro_v1",  JSON.stringify(l)); } catch {} };
  const saveM = v => { try { localStorage.setItem("meta_mensal", String(v)); } catch {} };
  const saveL = l => { try { localStorage.setItem("links_uteis", JSON.stringify(l)); } catch {} };

  // ── NAV ──
  const TABS = [
    { id:"prospeccao", label:"Prospecção" },
    { id:"financeiro", label:"Financeiro" },
    { id:"visao",      label:"Visão Geral" },
  ];
  const [navOpen, setNavOpen] = useState(false);
  const currentLabel = TABS.find(t=>t.id===section)?.label || "Prospecção";

  function navTitle() {
    return r("div", { style:{ position:"relative", display:"inline-block" } },
      r("button", {
        onClick: () => setNavOpen(o => !o),
        style: { background:"transparent", border:"none", cursor:"pointer", padding:0, ...sf, display:"flex", alignItems:"center", gap:7, marginTop:2 }
      },
        r("span", { style:{ fontSize:20, fontWeight:700, color:C.text, letterSpacing:"-0.4px" } }, currentLabel),
        r("svg", { viewBox:"0 0 24 24", width:15, height:15, fill:"none", stroke:C.muted, strokeWidth:2.5, strokeLinecap:"round", strokeLinejoin:"round",
          style:{ transition:"transform 0.2s", transform: navOpen ? "rotate(180deg)" : "rotate(0deg)", marginTop:1 } },
          r("polyline", { points:"6 9 12 15 18 9" })
        )
      ),
      navOpen && r("div", {
        style:{ position:"absolute", top:"calc(100% + 8px)", left:0, zIndex:200,
          background:"#161618", border:`1px solid ${C.border2}`, borderRadius:10,
          overflow:"hidden", minWidth:180, boxShadow:"0 8px 32px rgba(0,0,0,0.6)" }
      },
        ...TABS.map((t,i) => {
          const active = section===t.id;
          return r("button", {
            key: t.id,
            onClick: () => { setSection(t.id); setNavOpen(false); },
            style: { display:"block", width:"100%", textAlign:"left", cursor:"pointer",
              padding:"11px 16px", fontSize:14, fontWeight: active ? 600 : 400,
              color: active ? C.text : C.sub,
              background: active ? "rgba(255,255,255,0.05)" : "transparent",
              border:"none", borderTop: i>0 ? `1px solid ${C.border}` : "none", ...sf }
          },
            r("div", { style:{ display:"flex", alignItems:"center", justifyContent:"space-between" } },
              t.label,
              active && r("div", { style:{ width:6, height:6, borderRadius:"50%", background:C.accent } })
            )
          );
        })
      ),
      navOpen && r("div", { style:{ position:"fixed", inset:0, zIndex:199 }, onClick:()=>setNavOpen(false) })
    );
  }

  // ══════════════════════════════════════════════════════════
  // PROSPECÇÃO
  // ══════════════════════════════════════════════════════════
  const openCAdd  = () => { setCForm(EMPTY_C); setCEditId(null); setCModal(true); };

  const openProspectar = () => {
    const lote = creators.filter(c=>c.status==="Prospectando").slice(0,50);
    setProspectarLote(lote);
    setProspectarModal(true);
  };

  const finalizarLote = () => {
    const ids = new Set(prospectarLote.map(c=>c.id));
    const list = creators.map(c => ids.has(c.id) ? {...c, status:"Contato enviado"} : c);
    setCreators(list); saveC(list); setProspectarModal(false);
  };
  const openCEdit = c  => { setCForm({...c}); setCEditId(c.id); setCModal(true); };
  const saveC2 = () => {
    if (!cForm.nome.trim()) return;
    const list = cEditId!=null ? creators.map(c=>c.id===cEditId?{...cForm,id:cEditId}:c) : [...creators,{...cForm,id:Date.now()}];
    setCreators(list); saveC(list); setCModal(false);
  };
  const delC = id => { const l=creators.filter(c=>c.id!==id); setCreators(l); saveC(l); setCDelConf(null); };

  const cFiltered = creators.filter(c =>
    (!cSearch || c.nome.toLowerCase().includes(cSearch.toLowerCase()) || c.nicho?.toLowerCase().includes(cSearch.toLowerCase())) &&
    (!cFSt || c.status===cFSt) && (!cFPl || c.plataforma===cFPl) && (!cFNicho || c.nicho===cFNicho)
  );
  const cSC = STATUSES.reduce((a,s)=>({...a,[s]:creators.filter(c=>c.status===s).length}),{});

  function renderProspeccao() {
    const header = r("div", { style:{ borderBottom:`1px solid ${C.border}`, padding:"20px 28px 18px" } },
      r("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" } },
        r("div", null,
          r("div", { style:{ fontSize:11, fontWeight:600, color:C.muted, letterSpacing:"1.5px", textTransform:"uppercase", marginBottom:4 } }, "Editor de Vídeo"),
          navTitle(),
          r("p",  { style:{ margin:"3px 0 0", fontSize:13, color:C.muted } }, `${creators.length} criador${creators.length!==1?"es":""} cadastrado${creators.length!==1?"s":""}`)
        ),
        r("div", { style:{ display:"flex", gap:8 } },
          creators.filter(c=>c.status==="Prospectando").length > 0 &&
            r("button", { onClick:openProspectar, style:{ background:"transparent", color:C.sub, border:`1px solid ${C.border2}`, borderRadius:8, padding:"9px 16px", fontSize:13, fontWeight:600, cursor:"pointer", ...sf } }, "🎯 Prospectar Hoje"),
          r("button", { onClick:openCAdd, style:{ background:C.accent, color:"#000", border:"none", borderRadius:8, padding:"9px 20px", fontSize:13, fontWeight:700, cursor:"pointer", ...sf } }, "+ Adicionar")
        )
      ),
      creators.length>0 && r("div", { style:{ display:"flex", gap:20, marginTop:16, paddingTop:16, borderTop:`1px solid ${C.border}`, flexWrap:"wrap" } },
        r("div",null, r("div",{style:lSt},"Total"), r("div",{style:{fontSize:18,fontWeight:700,marginTop:3}},creators.length)),
        ...STATUSES.filter(s=>cSC[s]>0).map(s => {
          const [col]=STAT[s]; const active=cFSt===s;
          return r("div",{key:s,onClick:()=>setCFSt(active?"":s),style:{cursor:"pointer",opacity:cFSt&&!active?0.35:1,transition:"opacity 0.15s"}},
            r("div",{style:{...lSt,color:active?col:C.muted}},s),
            r("div",{style:{fontSize:18,fontWeight:700,marginTop:3,color:active?col:C.text}},cSC[s])
          );
        })
      ),
      r("div",{style:{display:"flex",gap:8,marginTop:14,flexWrap:"wrap"}},
        r("input",{value:cSearch, onInput:e=>setCSearch(e.target.value), placeholder:"Buscar por nome ou nicho...", style:{flex:1,minWidth:160,background:C.bg,border:`1px solid ${C.border2}`,borderRadius:8,padding:"8px 13px",color:C.text,fontSize:13,...sf,outline:"none"}}),
        r("select",{value:cFPl,onChange:e=>setCFPl(e.target.value),style:{background:C.bg,border:`1px solid ${C.border2}`,borderRadius:8,padding:"8px 13px",color:cFPl?C.text:C.muted,fontSize:13,...sf,cursor:"pointer",outline:"none"}},
          r("option",{value:""},"Todas as plataformas"),
          ...PLATFORMS.map(p=>r("option",{key:p,value:p},p))
        ),
        r("select",{value:cFNicho,onChange:e=>setCFNicho(e.target.value),style:{background:C.bg,border:`1px solid ${C.border2}`,borderRadius:8,padding:"8px 13px",color:cFNicho?C.text:C.muted,fontSize:13,...sf,cursor:"pointer",outline:"none"}},
          r("option",{value:""},"Todos os nichos"),
          ...NICHES.map(n=>r("option",{key:n,value:n},n))
        )
      )
    );

    const cards = cFiltered.length===0
      ? r("div",{style:{textAlign:"center",padding:"60px 0"}},
          r("div",{style:{fontSize:36,marginBottom:12}},"🎯"),
          r("p",{style:{color:C.muted,fontSize:14}},creators.length===0?"Nenhum criador ainda. Clique em + Adicionar.":"Nenhum resultado.")
        )
      : r("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(260px, 1fr))",gap:12}},
          ...cFiltered.map(c => {
            const pc=PLAT_COLOR[c.plataforma]||"#888";
            const [sc,sb]=STAT[c.status]||STAT.Prospectando;
            const isHov=cHovered===c.id, isDel=cDelConf===c.id;
            return r("div",{

    const curYM   = nowYM();
    const curYear = curYM.substring(0,4);
    const mesMes  = entries.filter(e=>e.data.startsWith(curYM)&&e.status==="Pago").reduce((s,e)=>s+(parseFloat(e.valor)||0),0);
    const anoTot  = entries.filter(e=>e.data.startsWith(curYear)&&e.status==="Pago").reduce((s,e)=>s+(parseFloat(e.valor)||0),0);
    const aReceber= entries.filter(e=>e.status==="Pendente").reduce((s,e)=>s+(parseFloat(e.valor)||0),0);
    const projMes = entries.filter(e=>e.data.startsWith(curYM)).length;
    const progPct  = meta>0 ? Math.min(100, Math.round(mesMes/meta*100)) : 0;
    const fechados = creators.filter(c=>c.status==="Fechado").length;
    const ativos   = creators.filter(c=>["Contatado","Em negociação"].includes(c.status)).length;

    const statCard = (label, value, color, sub) =>
      r("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"18px 20px",flex:1,minWidth:160}},
        r("div",{style:{...lSt,marginBottom:8}},label),
        r("div",{style:{fontSize:22,fontWeight:700,color:color||C.text,letterSpacing:"-0.5px"}},value),
        sub && r("div",{style:{fontSize:12,color:C.muted,marginTop:4}},sub)
      );

    return r("div",null,
      r("div",{style:{borderBottom:`1px solid ${C.border}`,padding:"20px 28px 18px"}},
        r("div",{style:{fontSize:11,fontWeight:600,color:C.muted,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:4}},"Editor de Vídeo"),
        navTitle()
      ),
      r("div",{style:{padding:"20px 28px",display:"flex",flexDirection:"column",gap:20}},

        // stats row
        r("div",{style:{display:"flex",gap:12,flexWrap:"wrap"}},
          statCard("Este mês", fmtBRL(mesMes), C.green, `${projMes} projeto${projMes!==1?"s":""}`),
          statCard("Este ano",  fmtBRL(anoTot), C.text),
          statCard("A receber", fmtBRL(aReceber), C.yellow),
        ),

        r("div",{style:{display:"flex",gap:12,flexWrap:"wrap"}},
          statCard("Clientes fechados", fechados, C.text, "no pipeline"),
          statCard("Em negociação",     ativos,   C.sub,  "contatados + negociando"),
          statCard("Prospecções ativas",creators.filter(c=>c.status==="Prospectando").length, C.muted),
        ),

        // meta mensal
        r("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"20px"}},
          r("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}},
            r("div",null,
              r("div",{style:{...lSt,marginBottom:4}},"Meta mensal"),
              r("div",{style:{fontSize:13,color:C.sub}}, meta>0 ? `${fmtBRL(mesMes)} de ${fmtBRL(meta)} (${progPct}%)` : "Nenhuma meta definida")
            ),
            editingMeta
              ? r("div",{style:{display:"flex",gap:8,alignItems:"center"}},
                  r("input",{value:metaInput,onInput:e=>setMetaInput(e.target.value),placeholder:"ex: 3000",type:"number",min:"0",style:{...iSt,marginTop:0,width:120,padding:"7px 10px",fontSize:13}}),
                  r("button",{onClick:()=>{const v=parseFloat(metaInput)||0;setMeta(v);saveM(v);setEditingMeta(false);},style:{background:C.accent,color:"#000",border:"none",borderRadius:7,padding:"7px 14px",fontSize:12,fontWeight:700,cursor:"pointer",...sf}},"Salvar"),
                  r("button",{onClick:()=>setEditingMeta(false),style:{background:"transparent",border:`1px solid ${C.border}`,borderRadius:7,padding:"7px 10px",fontSize:12,color:C.muted,cursor:"pointer",...sf}},"✕")
                )
              : r("button",{onClick:()=>{setMetaInput(meta||"");setEditingMeta(true);},style:{background:"transparent",border:`1px solid ${C.border2}`,borderRadius:7,padding:"7px 14px",fontSize:12,color:C.sub,cursor:"pointer",...sf}},meta>0?"Editar meta":"Definir meta")
          ),
          meta>0 && r("div",null,
            r("div",{style:{height:8,background:C.border,borderRadius:4,overflow:"hidden"}},
              r("div",{style:{height:"100%",width:`${progPct}%`,background:progPct>=100?C.green:progPct>=60?"#9B8BFF":C.yellow,borderRadius:4,transition:"width 0.4s ease"}})
            ),
            r("div",{style:{display:"flex",justifyContent:"space-between",marginTop:6}},
              r("span",{style:{fontSize:11,color:C.muted}},"R$ 0"),
              r("span",{style:{fontSize:11,color:C.muted}},fmtBRL(meta))
            )
          )
        )
        , // links úteis
        r("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"20px"}},
          r("div",{style:{...lSt,marginBottom:14}},"Links úteis"),
          links.length>0 && r("div",{style:{display:"flex",flexDirection:"column",gap:6,marginBottom:14}},
            ...links.map((lk,i)=>
              r("div",{key:i,style:{display:"flex",alignItems:"center",gap:10,background:"#0A0A0A",border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px"}},
                r("svg",{viewBox:"0 0 24 24",width:13,height:13,fill:"none",stroke:C.muted,strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round",style:{flexShrink:0}},
                  r("path",{d:"M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"}),
                  r("path",{d:"M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"})
                ),
                r("span",{style:{fontSize:13,fontWeight:600,color:C.sub,flexShrink:0,minWidth:80}},lk.label),
                r("a",{href:lk.url,target:"_blank",rel:"noopener noreferrer",style:{fontSize:12,color:C.muted,textDecoration:"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}},
                  lk.url.replace(/^https?:\/\/(www\.)?/,"")
                ),
                r("button",{onClick:()=>{ const l=links.filter((_,j)=>j!==i); setLinks(l); saveL(l); },style:{background:"transparent",border:"none",color:C.muted,cursor:"pointer",fontSize:13,padding:"0 2px",flexShrink:0}},"✕")
              )
            )
          ),
          r("div",{style:{display:"flex",gap:8}},
            r("input",{value:linkInput.label,onChange:e=>setLinkInput(l=>({...l,label:e.target.value})),placeholder:"Nome (ex: Portfólio)",style:{...iSt,marginTop:0,width:140,flexShrink:0}}),
            r("input",{value:linkInput.url,onChange:e=>setLinkInput(l=>({...l,url:e.target.value})),placeholder:"https://...",style:{...iSt,marginTop:0,flex:1},
              onKeyDown:e=>{
                if(e.key==="Enter"&&linkInput.label.trim()&&linkInput.url.trim()){
                  const url = linkInput.url.startsWith("http") ? linkInput.url : "https://"+linkInput.url;
                  const l=[...links,{label:linkInput.label.trim(),url}]; setLinks(l); saveL(l); setLinkInput({label:"",url:""});
                }
              }
            }),
            r("button",{
              onClick:()=>{
                if(!linkInput.label.trim()||!linkInput.url.trim()) return;
                const url = linkInput.url.startsWith("http") ? linkInput.url : "https://"+linkInput.url;
                const l=[...links,{label:linkInput.label.trim(),url}]; setLinks(l); saveL(l); setLinkInput({label:"",url:""});
              },
              style:{background:"#222",border:`1px solid ${C.border2}`,borderRadius:8,color:C.text,cursor:"pointer",padding:"0 14px",fontSize:18,flexShrink:0,...sf}
            },"+")
          )
        )
      )
    );
  }
  return r("div",{style:{minHeight:"100vh",background:C.bg,color:C.text,...sf}},
    !loading && section==="prospeccao" && renderProspeccao(),
    !loading && section==="financeiro" && renderFinanceiro(),
    !loading && section==="visao"      && renderVisao()
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(r(App));
</script>
</body>
</html>
